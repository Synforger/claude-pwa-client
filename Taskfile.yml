# =============================================================================
# Taskfile - claude-pwa-client unified entry point
# =============================================================================
# Prerequisites:
#   - go-task CLI:   `brew install go-task/tap/go-task` (macOS)
#                    Linux / Windows: https://taskfile.dev/installation/
#   - conda (recommended) or python3 venv
#
# Quickstart (= 初回 setup → 起動 → 接続確認):
#   task setup                        # conda env / pip / npm / config / VAPID / hooks まで 1 発
#   task build                        # frontend production build
#   task run                          # backend foreground 起動 (= dev、 Ctrl-C で停止)
#   #   or:
#   task install-service              # LaunchAgent 常駐 (macOS)
#   task status                       # LaunchAgent + port + /debug/healthcheck 12 項目
#
# Daily ops (= PC 再起動後の動線):
#   task status                       # backend 生死確認
#   task restart                      # backend kickstart (= 反応無い時)
#   task logs                         # backend error log tail
#
# Variables (= 自環境に合わせて上書き可、 例: PORT=8766 task status):
#   PORT (default 8765)
#   LAUNCH_AGENT_LABEL (default com.claudepwa.client)
#   CONDA_ENV (default pwa-client)
# =============================================================================

version: '3'

vars:
  PORT: '{{.PORT | default "8765"}}'
  LAUNCH_AGENT_LABEL: '{{.LAUNCH_AGENT_LABEL | default "com.claudepwa.client"}}'
  CONDA_ENV: '{{.CONDA_ENV | default "pwa-client"}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ===========================================================================
  # 初回 setup
  # ===========================================================================

  setup:
    desc: One-shot setup (conda env + pip + npm + config + VAPID + git hooks)
    cmds:
      - task: verify-deps
      - |
        # conda は shell function なので bash subshell で `command -v conda` が false に倒れる。
        # CONDA_EXE (= conda install で必ず export される) を直接叩いて env を作る / 入る。
        if [ -n "${CONDA_EXE:-}" ] && [ -x "$CONDA_EXE" ]; then
          "$CONDA_EXE" env list | awk '{print $1}' | grep -qx "{{.CONDA_ENV}}" || "$CONDA_EXE" create -y -n {{.CONDA_ENV}} python=3.11
          "$CONDA_EXE" run -n {{.CONDA_ENV}} --live-stream pip install -r backend/requirements.txt
        else
          echo "CONDA_EXE not set; falling back to python3 -m venv .venv"
          test -d .venv || python3 -m venv .venv
          .venv/bin/pip install -r backend/requirements.txt
        fi
      - cd frontend && npm install
      - |
        if [ ! -f backend/config.json ]; then
          cp backend/config.example.json backend/config.json
          echo "→ created backend/config.json from example. EDIT IT before next steps."
        fi
      - |
        if [ ! -f backend/secrets/vapid.json ]; then
          task gen-vapid
        else
          echo "→ vapid.json already present (skip)"
        fi
      - git config --local core.hooksPath .githooks
      - |
        echo ""
        echo "setup complete."
        echo "next:"
        echo "  task build              # frontend production build"
        echo "  task run                # backend foreground (= dev)"
        echo "  task install-service    # backend を LaunchAgent で常駐 (macOS)"
        echo "  task status             # backend 生死確認"

  verify-deps:
    desc: Check required binaries on PATH
    cmds:
      - |
        miss=0
        for bin in python3 node npm tmux claude; do
          if ! command -v "$bin" >/dev/null 2>&1; then
            echo "MISSING: $bin"; miss=1
          fi
        done
        for bin in jq conda; do
          command -v "$bin" >/dev/null 2>&1 || echo "WARN (optional): $bin not found"
        done
        if [ "$miss" -ne 0 ]; then
          echo "fix the MISSING binaries above before running 'task setup'"
          exit 1
        fi
        echo "deps OK"

  # ===========================================================================
  # 日常運用 (= dev)
  # ===========================================================================

  run:
    desc: Backend uvicorn foreground (= dev; Ctrl-C で停止)
    cmds:
      - |
        if [ -n "${CONDA_EXE:-}" ] && [ -x "$CONDA_EXE" ]; then
          "$CONDA_EXE" run -n {{.CONDA_ENV}} --live-stream uvicorn backend.main:app --host 0.0.0.0 --port {{.PORT}}
        else
          .venv/bin/uvicorn backend.main:app --host 0.0.0.0 --port {{.PORT}}
        fi

  build:
    desc: Frontend production build (= dist/、 backend が配信)
    cmds:
      - cd frontend && npm run build

  dev:frontend:
    desc: Frontend Vite dev server (= backend は LaunchAgent or task run 前提)
    cmds:
      - cd frontend && npm run dev

  tailscale-serve:
    desc: Publish backend on tailnet (= https 配信)
    cmds:
      - tailscale serve --bg http://localhost:{{.PORT}}

  # ===========================================================================
  # LaunchAgent (= 常駐起動、 macOS)
  # ===========================================================================

  install-service:
    desc: Install LaunchAgent plist (= 初回のみ; manual edit が要る)
    cmds:
      - |
        TARGET="$HOME/Library/LaunchAgents/{{.LAUNCH_AGENT_LABEL}}.plist"
        if [ -f "$TARGET" ]; then
          echo "$TARGET already exists; skip copy (= edit by hand if needed)"
        else
          cp docs/setup/launchd/com.claudepwa.client.plist.example "$TARGET"
          echo "copied to $TARGET"
        fi
        echo ""
        echo "next:"
        echo "  1. edit absolute paths inside $TARGET (cwd / conda env / log dest)"
        echo "  2. launchctl bootstrap gui/$(id -u) $TARGET"
        echo "  3. task status"

  uninstall-service:
    desc: Bootout LaunchAgent (= 常駐停止; plist file は残置)
    cmds:
      - 'launchctl bootout gui/$(id -u) "$HOME/Library/LaunchAgents/{{.LAUNCH_AGENT_LABEL}}.plist" || true'
      - echo "stopped. plist file は残置 (= 復帰時は launchctl bootstrap で再 load)"

  restart:
    desc: Kickstart LaunchAgent (= backend 再起動; PC 再起動後の手動復旧用)
    cmds:
      - 'launchctl kickstart -k gui/$(id -u)/{{.LAUNCH_AGENT_LABEL}}'
      - sleep 2
      - task: status

  status:
    desc: One-shot health probe (= LaunchAgent + port + /debug/healthcheck 12 項目)
    cmds:
      - |
        echo "=== LaunchAgent ({{.LAUNCH_AGENT_LABEL}}) ==="
        if launchctl list | awk '{print $3}' | grep -qx "{{.LAUNCH_AGENT_LABEL}}"; then
          launchctl list | grep "{{.LAUNCH_AGENT_LABEL}}"
        else
          echo "(not loaded; run: task install-service)"
        fi
      - |
        echo ""
        echo "=== port {{.PORT}} listen ==="
        lsof -nP -iTCP:{{.PORT}} -sTCP:LISTEN 2>/dev/null || echo "(nothing listening on {{.PORT}})"
      - |
        echo ""
        echo "=== /debug/healthcheck (12 probes) ==="
        PORT={{.PORT}} bash scripts/healthcheck.sh

  logs:
    desc: Tail backend error log (= Ctrl-C で停止)
    cmds:
      - tail -f logs/backend.error.log

  # ===========================================================================
  # 品質ゲート
  # ===========================================================================

  test:
    desc: Run backend pytest + frontend vitest
    cmds:
      - task: test:backend
      - task: test:frontend

  test:backend:
    desc: pytest over backend/tests/
    cmds:
      - |
        if [ -n "${CONDA_EXE:-}" ] && [ -x "$CONDA_EXE" ]; then
          "$CONDA_EXE" run -n {{.CONDA_ENV}} --live-stream python -m pytest backend/tests -q
        else
          .venv/bin/python -m pytest backend/tests -q
        fi

  test:frontend:
    desc: vitest over frontend/src/
    cmds:
      - cd frontend && npm test -- --run

  test:unit:
    desc: 'Deprecated alias for test:backend (kept for back-compat)'
    cmds:
      - task: test:backend

  lint:
    desc: Run lint for backend (flake8) and frontend (ESLint)
    cmds:
      - task: lint:backend
      - task: lint:frontend

  lint:backend:
    desc: flake8 critical-only checks over backend/
    cmds:
      - |
        if [ -n "${CONDA_EXE:-}" ] && [ -x "$CONDA_EXE" ]; then
          "$CONDA_EXE" run -n {{.CONDA_ENV}} --live-stream python -m flake8 backend --jobs 1 --count --show-source --statistics
        else
          .venv/bin/python -m flake8 backend --jobs 1 --count --show-source --statistics
        fi

  lint:frontend:
    desc: ESLint over frontend/src/
    cmds:
      - cd frontend && npm run lint

  lint:fix:
    desc: Lint and autoformat with black (backend) + ESLint (frontend)
    cmds:
      - |
        if [ -n "${CONDA_EXE:-}" ] && [ -x "$CONDA_EXE" ]; then
          "$CONDA_EXE" run -n {{.CONDA_ENV}} --live-stream python -m black backend
        else
          .venv/bin/python -m black backend
        fi
      - cd frontend && npm run lint

  anon:scan:
    desc: Full-tree anonymity scan (= pre-commit hook と同じ scanner、 全 file)
    cmds:
      - bash .tooling/local-ci/anon-scan.sh

  clean:
    desc: Purge __pycache__ + node_modules cache + frontend dist
    cmds:
      - 'find backend -name __pycache__ -type d -exec rm -rf {} + 2>/dev/null || true'
      - rm -rf frontend/dist
      - 'find frontend/node_modules/.vite -maxdepth 0 -type d -exec rm -rf {} + 2>/dev/null || true'
      - echo "clean done"

  # ===========================================================================
  # VAPID 鍵
  # ===========================================================================

  gen-vapid:
    desc: Generate VAPID keypair (= 初回のみ; 既存があれば error)
    cmds:
      - |
        if [ -n "${CONDA_EXE:-}" ] && [ -x "$CONDA_EXE" ]; then
          "$CONDA_EXE" run -n {{.CONDA_ENV}} --live-stream python -m backend.cli.gen_vapid
        else
          .venv/bin/python -m backend.cli.gen_vapid
        fi

  gen-notices:
    desc: Regenerate THIRD_PARTY_NOTICES.md (= dependency 追加 / 削除 / version bump 時)
    cmds:
      - |
        if [ -n "${CONDA_EXE:-}" ] && [ -x "$CONDA_EXE" ]; then
          "$CONDA_EXE" run -n {{.CONDA_ENV}} --live-stream pip install --quiet pip-licenses
          "$CONDA_EXE" run -n {{.CONDA_ENV}} --live-stream python3 scripts/gen-third-party-notices.py
        else
          .venv/bin/pip install --quiet pip-licenses
          .venv/bin/python3 scripts/gen-third-party-notices.py
        fi

  gen-vapid:force:
    desc: '!! DANGER !! Re-generate VAPID (= 既存 push subscription 全 invalidate)'
    cmds:
      - |
        echo "WARNING: all existing Web Push subscriptions will be invalidated."
        echo "5 seconds to abort with Ctrl-C..."
        sleep 5
      - |
        if [ -n "${CONDA_EXE:-}" ] && [ -x "$CONDA_EXE" ]; then
          "$CONDA_EXE" run -n {{.CONDA_ENV}} --live-stream python -m backend.cli.gen_vapid --force
        else
          .venv/bin/python -m backend.cli.gen_vapid --force
        fi
